# Full-stack production compose: app + Postgres + Redis. Migration = pull image.
#   docker compose -f docker-compose.prod.yml up -d --build
# Reads non-infra config (Stripe/Resend/AI/etc.) from .env via env_file; the
# DB/Redis hosts are overridden to the compose service names.
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-france}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-france_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-france_os}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-france} -d ${POSTGRES_DB:-france_os}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # One-shot schema sync; the app waits for it to finish.
  migrate:
    build:
      context: .
      target: builder
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-france}:${POSTGRES_PASSWORD:-france_dev_pwd}@postgres:5432/${POSTGRES_DB:-france_os}?schema=public
    command: npx prisma db push --skip-generate
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-france}:${POSTGRES_PASSWORD:-france_dev_pwd}@postgres:5432/${POSTGRES_DB:-france_os}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pg_data:
  redis_data:
