name: SSH Debug

# 仅手动触发，用于排查 SSH 连接问题。排查完可删掉本文件。
on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test SSH connection (verbose)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_test
          chmod 600 ~/.ssh/id_test
          echo "host=[${{ secrets.SSH_HOST }}] user=[${{ secrets.SSH_USER }}] port=[${{ secrets.SSH_PORT }}]"
          echo "--- key first line / last line / line count ---"
          head -n1 ~/.ssh/id_test
          tail -n1 ~/.ssh/id_test
          wc -l < ~/.ssh/id_test
          echo "--- does ssh-keygen accept the key? ---"
          ssh-keygen -y -f ~/.ssh/id_test >/dev/null 2>&1 && echo "KEY_OK" || echo "KEY_INVALID (private key in secret is malformed)"
          echo "--- verbose connect attempt ---"
          ssh -vvv -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            -i ~/.ssh/id_test \
            -p "${{ secrets.SSH_PORT || 22 }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "whoami && echo CONNECT_OK" || true
