name: Deploy to VPS

# 推送到 main(或手动触发)后，SSH 到 VPS 拉取最新代码、构建并零停机重启。
# 用原生 ssh（已验证可连），不依赖第三方 action。
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SSH_PORT:-22}"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            -i ~/.ssh/deploy_key -p "$PORT" "$SSH_USER@$SSH_HOST" bash -s <<'REMOTE'
          set -e
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /home/france-infor/htdocs/infr.europeanaialliance.org
          echo "→ git pull";        git pull --ff-only
          echo "→ npm ci";          npm ci --include=dev
          echo "→ prisma db push";  npx prisma db push
          echo "→ build";           npm run build
          echo "→ pm2 reload";      pm2 reload ecosystem.config.cjs
          echo "✓ deployed"
          REMOTE
